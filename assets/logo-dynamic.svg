<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 220" role="img" aria-labelledby="title desc">
  <title id="title">AEY Studio Logo</title>
  <desc id="desc">Dynamic AEY logo with arrow mark and tagline</desc>
  <defs>
    <linearGradient id="aeyAccent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="var(--logo-accent, #80beff)"/>
      <stop offset="100%" stop-color="var(--logo-accent-2, #2f67ff)"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="var(--logo-glow, rgba(88,160,255,.22))"/>
    </filter>
  </defs>
  <g filter="url(#softGlow)">
    <path d="M76 146 L128 38 L206 38 L164 86 L186 92 L136 170 L153 116 L110 104 L169 60 L145 60 L76 146 Z" fill="url(#aeyAccent)"/>
    <path d="M196 170 L243 38 L306 38 L354 170 L293 170 L269 98 L243 170 Z" fill="currentColor" opacity=".98"/>
    <path d="M382 38 H552 V84 H439 V94 H533 V138 H439 V170 H560 V170 H382 Z" fill="currentColor" opacity=".98"/>
    <path d="M562 38 H630 L675 98 L719 38 H760 L704 114 V170 H645 V114 Z" fill="currentColor" opacity=".98"/>
  </g>
  <text x="84" y="212" font-size="38" font-family="Inter, Arial, sans-serif" font-weight="700" fill="currentColor" opacity=".94">We Design Your Success</text>
</svg>
