<!DOCTYPE html>
<html lang="en" dir="ltr" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Project | AEY Studio</title>
    <meta name="description" content="AEY Studio project case study page." />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="project-page-body">
    <div class="page-glow glow-1"></div>
    <div class="page-glow glow-2"></div>
    <header class="site-header compact-header">
      <div class="container nav-shell">
        <a href="index.html#top" class="brand" aria-label="AEY Studio home">
          <img class="logo logo-dark" src="assets/logo-dark.png" alt="AEY Studio logo" />
          <img class="logo logo-light" src="assets/logo-light.png" alt="AEY Studio logo" />
        </a>
        <div class="header-actions">
          <button class="ghost-icon-btn" id="themeToggle" type="button" aria-label="Toggle theme"><span class="theme-mark">◐</span></button>
          <button class="ghost-icon-btn lang-btn" id="langToggle" type="button" aria-label="Toggle language">AR</button>
          <a class="primary-chip" href="index.html#contact" data-i18n="letsTalk">Let’s Talk</a>
        </div>
      </div>
    </header>

    <main class="project-main">
      <section class="section-first">
        <div class="container project-hero" id="projectRoot"></div>
      </section>
    </main>

    <script src="js/projects.js"></script>
    <script src="js/main.js"></script>
  </body>
</html>
